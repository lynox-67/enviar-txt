<!-- ... mismo HTML head y body que antes, solo cambia el script por este -->

<script>
let linksFiltrados = [];
let contenidosExtraidos = [];
let indiceActual = 0;
const TAMANO_LOTE = 50;          // ¡Cambia esto! 20–100 según tu conexión
const PAUSA_MS = 6000;           // 6 segundos base + random

const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const webhookEl = document.getElementById('webhook');

function mostrarEstado(texto, tipo = '') {
  statusEl.textContent = texto;
  statusEl.className = tipo;
}

function esLinkTxtDiscord(url) {
  try {
    const u = url.toLowerCase();
    if (!u.startsWith('https://cdn.discordapp.com/attachments/')) return false;
    const path = u.split('?')[0];
    return path.endsWith('.txt');
  } catch {
    return false;
  }
}

async function procesarLote() {
  if (indiceActual >= linksFiltrados.length) {
    mostrarEstado(`Extracción completa: ${contenidosExtraidos.length} archivos obtenidos`, 'success');
    if (contenidosExtraidos.length > 0) await enviarArchivosExtraidos();
    return;
  }

  const finLote = Math.min(indiceActual + TAMANO_LOTE, linksFiltrados.length);
  let exitososLote = 0;
  let fallidosLote = 0;

  mostrarEstado(`Procesando lote ${indiceActual+1}–${finLote} de ${linksFiltrados.length}...`);

  for (let i = indiceActual; i < finLote; i++) {
    const url = linksFiltrados[i];
    const nombre = url.split('/').pop().split('?')[0] || `txt_${i+1}.txt`;
    
    try {
      const res = await fetch(url, { mode: 'cors', credentials: 'omit' });
      if (res.ok) {
        const texto = await res.text();
        contenidosExtraidos.push({ nombre, contenido: texto });
        exitososLote++;
      } else {
        fallidosLote++;
      }
    } catch {
      fallidosLote++;
    }
    
    mostrarEstado(`Lote ${indiceActual+1}–${finLote}: ${exitososLote} OK / ${fallidosLote} fallos | Total extraídos: ${contenidosExtraidos.length}`);
    
    // Pausa anti-ban
    await new Promise(r => setTimeout(r, PAUSA_MS + Math.random() * 4000));
  }

  indiceActual = finLote;

  if (indiceActual < linksFiltrados.length) {
    mostrarEstado(`Lote terminado. ${exitososLote} nuevos archivos. ¿Continuar con el siguiente lote?`, 'success');
    document.getElementById('startSend').textContent = "CONTINUAR SIGUIENTE LOTE";
  } else {
    mostrarEstado(`¡Todos los lotes procesados! ${contenidosExtraidos.length} archivos listos para enviar.`, 'success');
    await enviarArchivosExtraidos();
  }
}

async function iniciarOContinuar() {
  if (linksFiltrados.length === 0) {
    // Primera ejecución: leer y filtrar
    const input = document.getElementById('fileInput');
    if (!input.files?.length) return mostrarEstado('Selecciona txt con links primero', 'error');

    const setUrls = new Set();
    for (const file of input.files) {
      try {
        const txt = await file.text();
        const urls = txt.match(/https?:\/\/[^\s<>"'()]+/gi) || [];
        urls.forEach(u => { if (esLinkTxtDiscord(u)) setUrls.add(u.trim()); });
      } catch {}
    }

    linksFiltrados = Array.from(setUrls);
    if (linksFiltrados.length === 0) return mostrarEstado('No hay links .txt válidos', 'warning');

    previewEl.textContent = linksFiltrados.slice(0, 20).map((u,i)=>`${i+1}. ${u}`).join('\n') + 
      (linksFiltrados.length > 20 ? `\n... y ${linksFiltrados.length-20} más` : '');

    indiceActual = 0;
    contenidosExtraidos = [];
    document.getElementById('startSend').textContent = "PROCESAR PRIMER LOTE";
  }

  await procesarLote();
}

async function enviarArchivosExtraidos() {
  const webhook = webhookEl.value.trim();
  if (!webhook) return mostrarEstado('Pega un webhook válido', 'error');

  mostrarEstado(`Enviando ${contenidosExtraidos.length} archivos... (paciencia)`);

  for (let i = 0; i < contenidosExtraidos.length; i++) {
    const { nombre, contenido } = contenidosExtraidos[i];
    const blob = new Blob([contenido], {type: 'text/plain'});
    const formData = new FormData();
    formData.append('file', blob, nombre);
    formData.append('payload_json', JSON.stringify({ content: `Lynox Hub • ${nombre}` }));

    try {
      const res = await fetch(webhook, { method: 'POST', body: formData });
      if (res.ok) {
        mostrarEstado(`Enviado ${i+1}/${contenidosExtraidos.length}: ${nombre}`);
      } else {
        mostrarEstado(`Error ${res.status} en ${nombre}`, 'error');
      }
      await new Promise(r => setTimeout(r, 2500)); // pausa envío
    } catch (e) {
      mostrarEstado(`Fallo envío ${nombre}`, 'error');
    }
  }

  mostrarEstado('Envío terminado ✓', 'success');
}

document.getElementById('startSend').onclick = iniciarOContinuar;
</script>
