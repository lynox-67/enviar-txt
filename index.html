<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 SHADOW LINK • TikTok Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root { --green: #00ff41; --dark: #0a0a0a; --gray: #111111; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: var(--green);
            font-family: 'VT323', monospace;
            line-height: 1.4;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.08) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 1;
            opacity: 0.15;
        }
        
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; position: relative; z-index: 2; }
        
        header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid var(--green); padding-bottom: 20px; }
        
        .title {
            font-size: 4.2rem;
            letter-spacing: 8px;
            text-shadow: 0 0 10px var(--green), 0 0 20px var(--green), 0 0 40px var(--green);
            animation: glitch 1.5s infinite;
        }
        
        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--green), -2px -2px #ff00ff; }
            20% { text-shadow: -2px -2px var(--green), 2px 2px #00ffff; }
            40% { text-shadow: 2px -2px var(--green), -2px 2px #ffff00; }
            60% { text-shadow: -2px 2px var(--green), 2px -2px #ff00ff; }
            80% { text-shadow: 2px 2px var(--green), -2px -2px #00ffff; }
            100% { text-shadow: -2px -2px var(--green), 2px 2px #ffff00; }
        }
        
        .subtitle { font-size: 1.4rem; opacity: 0.8; letter-spacing: 4px; }
        
        .terminal {
            background: #111;
            border: 3px solid var(--green);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            min-height: 520px;
            position: relative;
        }
        
        .terminal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px dashed var(--green);
            padding-bottom: 10px; font-size: 1.3rem;
        }
        
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .tab {
            flex: 1; padding: 12px; text-align: center; background: #000;
            border: 2px solid var(--green); color: var(--green);
            cursor: pointer; font-size: 1.4rem; transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--green); color: #000; box-shadow: 0 0 20px var(--green);
        }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 20px; }
        
        input, select {
            flex: 1; background: #000; border: 2px solid var(--green);
            color: var(--green); font-family: 'VT323', monospace;
            font-size: 1.5rem; padding: 14px 18px; outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        
        input:focus, select:focus { box-shadow: 0 0 25px var(--green); }
        
        button {
            background: #000; color: var(--green); border: 3px solid var(--green);
            padding: 14px 32px; font-family: 'VT323', monospace;
            font-size: 1.6rem; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }
        
        button:hover {
            background: var(--green); color: #000;
            transform: scale(1.05); box-shadow: 0 0 30px var(--green);
        }
        
        .status { font-size: 1.3rem; margin: 15px 0; min-height: 28px; }
        
        .links-list {
            max-height: 380px; overflow-y: auto; font-size: 1.4rem;
            line-height: 1.8;
        }
        
        .link-item {
            padding: 8px 0; border-bottom: 1px dotted rgba(0, 255, 65, 0.3);
            word-break: break-all; display: flex; align-items: center; gap: 12px;
        }
        
        .link-item:hover { background: rgba(0, 255, 65, 0.1); }
        
        .no-links {
            text-align: center; opacity: 0.6; font-size: 1.6rem; padding: 60px 0;
        }
        
        .download-section {
            margin-top: 25px;
            padding: 15px;
            border: 2px dashed var(--green);
            background: rgba(0, 255, 65, 0.05);
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        footer { text-align: center; margin-top: 40px; font-size: 1.1rem; opacity: 0.5; }
        
        .blink { animation: blink 1s step-end infinite; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <header>
            <div class="title">SHADOW LINK</div>
            <div class="subtitle">TIKTOK COMMENT HUNTER v2.2 • DOWNLOAD ENABLED</div>
            <p style="margin-top: 10px; opacity: 0.7; font-size: 1.3rem;">
                🔥 Video o Búsqueda • Extrae https:// • DESCARGA DIRECTA EN ARCHIVO
            </p>
        </header>

        <div class="terminal">
            <div class="terminal-header">
                <div>root@shadowlink:~# ./tiktok_hunter.py</div>
                <div class="blink">[ LIVE ]</div>
            </div>

            <!-- Modo Tabs -->
            <div class="mode-tabs">
                <div class="tab active" onclick="switchMode(0)" id="tab-single">📼 VIDEO ÚNICO</div>
                <div class="tab" onclick="switchMode(1)" id="tab-search">🔎 BÚSQUEDA KEYWORDS</div>
            </div>

            <!-- Formulario Video Único -->
            <div id="form-single">
                <div class="input-group">
                    <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@usuario/video/1234567890123456789" value="">
                    <button onclick="extraerLinks()">SCAN VIDEO</button>
                </div>
            </div>

            <!-- Formulario Búsqueda -->
            <div id="form-search" style="display: none;">
                <div class="input-group">
                    <input type="text" id="keywords" placeholder="frezze trade, método Moreira" value="frezze trade, método Moreira">
                    <select id="maxVideos">
                        <option value="10">10 vídeos</option>
                        <option value="20" selected>20 vídeos</option>
                        <option value="30">30 vídeos</option>
                    </select>
                    <button onclick="extraerLinks()">SCAN SEARCH</button>
                </div>
            </div>

            <!-- Status -->
            <div id="status" class="status"></div>

            <!-- Resultados -->
            <div id="results">
                <div id="linksContainer" class="links-list"></div>
            </div>
        </div>

        <footer>
            ✅ SÍ SE PUEDE DESCARGAR EN ARCHIVO • TXT + CSV • 100% local • 2026
        </footer>
    </div>

    <script>
        let currentMode = 0;

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === mode));
            document.getElementById('form-single').style.display = mode === 0 ? 'block' : 'none';
            document.getElementById('form-search').style.display = mode === 1 ? 'block' : 'none';
        }

        function extraerLinksDelTexto(texto) {
            const regex = /https?:\/\/[^\s<>"]+/g;
            return texto.match(regex) || [];
        }

        async function extraerLinks() {
            const statusEl = document.getElementById('status');
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';
            
            statusEl.innerHTML = '<span style="color:#ffff00;">[HACKING] Iniciando escaneo con TikTok-Api...</span>';

            let payload = {};

            if (currentMode === 0) {
                const url = document.getElementById('videoUrl').value.trim();
                if (!url.includes('tiktok.com')) {
                    statusEl.innerHTML = '❌ ERROR: Solo links de TikTok';
                    return;
                }
                payload = { mode: 'single', url: url };
            } else {
                const keywords = document.getElementById('keywords').value.trim();
                const maxVideos = parseInt(document.getElementById('maxVideos').value);
                if (!keywords) {
                    statusEl.innerHTML = '❌ ERROR: Ingresa palabras clave';
                    return;
                }
                payload = { mode: 'search', keywords: keywords, maxVideos: maxVideos };
            }

            try {
                const response = await fetch('/extraer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Error en el servidor');

                statusEl.innerHTML = `<span style="color:var(--green);">✅ ESCANEO COMPLETO • ${data.total_links} links únicos</span>`;

                if (data.links && data.links.length > 0) {
                    let html = `<div style="margin-bottom:15px; color:#00cc33;">LINKS ENCONTRADOS (${data.links.length}):</div>`;
                    
                    data.links.forEach((link, i) => {
                        html += `
                            <div class="link-item">
                                <span style="color:#00cc33;">${(i+1).toString().padStart(2, '0')}.</span>
                                <a href="${link}" target="_blank" style="color:var(--green); text-decoration:none;">${link}</a>
                            </div>`;
                    });
                    
                    container.innerHTML = html;

                    // ====================== SECCIÓN DE DESCARGA ======================
                    const downloadHTML = `
                        <div class="download-section">
                            <button onclick="descargarArchivo(${JSON.stringify(data.links)}, 'txt')" style="padding:12px 28px; font-size:1.4rem;">
                                💾 DESCARGAR .TXT
                            </button>
                            <button onclick="descargarArchivo(${JSON.stringify(data.links)}, 'csv')" style="padding:12px 28px; font-size:1.4rem;">
                                📊 DESCARGAR .CSV (Excel)
                            </button>
                            <button onclick="copiarTodos('${data.links.join('\n')}')" style="padding:12px 28px; font-size:1.4rem;">
                                📋 COPIAR TODOS
                            </button>
                        </div>`;
                    
                    container.innerHTML += downloadHTML;
                } else {
                    container.innerHTML = `<div class="no-links">No se encontraron enlaces https://<br>Prueba con otros keywords o vídeo.</div>`;
                }

            } catch (err) {
                statusEl.innerHTML = `❌ ERROR: ${err.message}`;
            }
        }

        // ====================== DESCARGA EN ARCHIVO (TXT o CSV) ======================
        function descargarArchivo(linksArray, tipo) {
            const fecha = new Date().toISOString().slice(0,10).replace(/-/g, '');
            let filename = `shadow_links_${fecha}`;
            let content = '';
            let mime = '';
            let ext = '';

            if (tipo === 'txt') {
                content = linksArray.join('\n');
                mime = 'text/plain';
                ext = '.txt';
            } else if (tipo === 'csv') {
                content = 'NUMERO,LINK\n' + linksArray.map((link, i) => `${i+1},"${link}"`).join('\n');
                mime = 'text/csv';
                ext = '.csv';
                filename += '_excel';
            }

            const blob = new Blob([content], { type: mime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename + ext;
            a.click();
            
            // Mensaje hacker
            console.log(`%c📤 Archivo ${ext.toUpperCase()} descargado: ${filename + ext}`, 'color:#00ff41; font-family:VT323');
        }

        function copiarTodos(texto) {
            navigator.clipboard.writeText(texto).then(() => {
                alert('✅ Todos los links copiados al portapapeles');
            });
        }

        // Enter key
        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                if (currentMode === 0 && document.getElementById('videoUrl') === document.activeElement) extraerLinks();
                if (currentMode === 1 && document.getElementById('keywords') === document.activeElement) extraerLinks();
            }
        });
    </script>
</body>
</html>
