<script>
let linksFiltrados = [];
let contenidosExtraidos = [];

const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const webhookEl = document.getElementById('webhook');

function mostrarEstado(texto, tipo = '') {
  statusEl.textContent = texto;
  statusEl.className = tipo;
}

function esLinkTxtDiscord(url) {
  try {
    const u = url.toLowerCase();
    if (!u.startsWith('https://cdn.discordapp.com/attachments/')) return false;
    // Aceptamos hasta el final del hm=... (incluyendo & si hay más params)
    const path = u.split('?')[0];
    return path.endsWith('.txt');
  } catch {
    return false;
  }
}

async function procesarArchivos() {
  const input = document.getElementById('fileInput');
  if (!input.files?.length) return mostrarEstado('Selecciona tu txt con links primero', 'error');

  mostrarEstado(`Leyendo archivo(s)...`);
  const setUrls = new Set();

  for (const file of input.files) {
    try {
      const texto = await file.text();
      // Regex mejorado: captura URLs completas hasta espacio o fin de línea, permitiendo & y =
      const urls = texto.match(/https:\/\/cdn\.discordapp\.com\/attachments\/[^ \n\r\t<>"']+/gi) || [];
      urls.forEach(u => {
        if (esLinkTxtDiscord(u)) setUrls.add(u.trim());
      });
    } catch (err) {
      console.warn('Error leyendo:', err);
    }
  }

  linksFiltrados = Array.from(setUrls);
  if (linksFiltrados.length === 0) {
    mostrarEstado('No se encontraron links válidos .txt de cdn.discordapp.com', 'warning');
    previewEl.textContent = '';
    return;
  }

  // Mostrar preview con links completos
  previewEl.textContent = linksFiltrados.slice(0, 30).map((u,i) => `${i+1}. ${u}`).join('\n') +
    (linksFiltrados.length > 30 ? `\n\n... y ${linksFiltrados.length - 30} más (total: ${linksFiltrados.length})` : '');

  mostrarEstado(`Encontrados ${linksFiltrados.length} links completos → extrayendo (puede tardar)...`);

  contenidosExtraidos = [];
  let exitosos = 0;
  let fallidos = 0;

  for (let i = 0; i < linksFiltrados.length; i++) {
    const url = linksFiltrados[i];
    const nombre = url.split('/').pop().split('?')[0] || `extraido_${i+1}.txt`;

    mostrarEstado(`Intentando ${i+1}/${linksFiltrados.length}: ${nombre}`);

    let obtenido = false;

    // Intento 1: link completo original
    try {
      const res = await fetch(url, { mode: 'cors', credentials: 'omit', cache: 'no-cache' });
      if (res.ok) {
        const texto = await res.text();
        contenidosExtraidos.push({ nombre, contenido: texto });
        exitosos++;
        obtenido = true;
        mostrarEstado(`ÉXITO: ${nombre} (${texto.length} chars)`);
      }
    } catch {}

    // Intento 2: sin parámetros de firma (si el 1 falló)
    if (!obtenido) {
      const urlLimpia = url.split('?')[0];
      try {
        const res = await fetch(urlLimpia, { mode: 'cors', credentials: 'omit', cache: 'no-cache' });
        if (res.ok) {
          const texto = await res.text();
          contenidosExtraidos.push({ nombre, contenido: texto });
          exitosos++;
          obtenido = true;
          mostrarEstado(`ÉXITO (sin firma): ${nombre}`);
        }
      } catch {}
    }

    if (!obtenido) fallidos++;

    await new Promise(r => setTimeout(r, 5000 + Math.random() * 4000)); // 5–9 segundos pausa
  }

  let resumen = `Extracción terminada:\nÉxitos: ${exitosos}\nFallidos: ${fallidos}`;
  if (exitosos === 0) {
    resumen += `\n\nTodos fallaron → links caducados o eliminados (prueba manual uno en navegador).`;
  }

  mostrarEstado(resumen, exitosos > 0 ? 'success' : 'error');

  if (exitosos > 0 && webhookEl.value.trim()) {
    await enviarArchivosExtraidos();
  }
}

async function enviarArchivosExtraidos() {
  const webhook = webhookEl.value.trim();
  if (!webhook) return mostrarEstado('No hay webhook → extracción lista, pero no se envía.');

  mostrarEstado(`Enviando ${contenidosExtraidos.length} archivos...`);

  for (let i = 0; i < contenidosExtraidos.length; i++) {
    const { nombre, contenido } = contenidosExtraidos[i];
    const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
    const formData = new FormData();
    formData.append('file', blob, nombre);
    formData.append('payload_json', JSON.stringify({ content: `Lynox Hub • ${nombre}` }));

    try {
      await fetch(webhook, { method: 'POST', body: formData });
      mostrarEstado(`Enviado ${i+1}/${contenidosExtraidos.length}: ${nombre}`);
    } catch {}
    await new Promise(r => setTimeout(r, 3000));
  }

  mostrarEstado('Envío finalizado (los que se extrajeron).', 'success');
}

document.getElementById('startSend').onclick = procesarArchivos;
</script>
